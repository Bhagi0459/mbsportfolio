<section id="certifications" class="section-divider">
  <div class="section-inner">
    <app-section-heading
      index="07 — Certifications"
      title="Credentialed, not just self-taught"
      lead="Formal coursework alongside the day-to-day Angular, data, and AI work."
    />

    <div class="cert-grid">
      @for (cert of certifications(); track cert.name; let i = $index) {
        <div class="cert-card panel reveal" [appReveal]="i" appTilt>
          <span class="cert-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path
                d="M12 2.4l2.55 5.02 5.55.78-4.02 3.86.95 5.52L12 14.9l-4.98 2.68.95-5.52-4.02-3.86 5.55-.78L12 2.4z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <h3>{{ cert.name }}</h3>
          <p class="cert-meta">{{ cert.issuer }} &middot; {{ cert.period }}</p>
        </div>
      }
    </div>
  </div>
</section>
