<section id="experience" class="section-divider">
  <div class="section-inner">
    <app-section-heading
      index="02 — Experience"
      title="Track record"
      lead="Two roles, one continuous thread: enterprise Angular applications that survive contact with real healthcare, financial-services, and administration workflows."
    />

    <ol class="timeline">
      @for (entry of entries(); track entry.org; let i = $index) {
        <li class="entry reveal" [appReveal]="i" [class.expanded]="expandedIndex() === i">
          <button type="button" class="entry-head" (click)="toggle(i)" [attr.aria-expanded]="expandedIndex() === i">
            <span class="marker" [class.live]="entry.current" aria-hidden="true"></span>
            <span class="head-text">
              <span class="role-org">
                <strong>{{ entry.role }}</strong>
                <span class="org">{{ entry.org }}</span>
              </span>
              <span class="period">{{ entry.period }}</span>
            </span>
            <svg class="chevron" viewBox="0 0 20 20" width="18" height="18" aria-hidden="true">
              <path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <p class="summary">{{ entry.summary }}</p>

          <div class="entry-body">
            <ul class="highlights">
              @for (h of entry.highlights; track h) {
                <li>{{ h }}</li>
              }
            </ul>
            <div class="stack-row">
              @for (s of entry.stack; track s) {
                <span class="chip"><app-tech-icon [name]="s" />{{ s }}</span>
              }
            </div>
          </div>
        </li>
      }
    </ol>
  </div>
</section>
