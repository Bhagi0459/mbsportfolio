<header class="topbar" [class.scrolled]="scrolled()">
  <div class="section-inner topbar-inner">
    <a href="#home" appScrollTo="home" class="brand" (click)="close()">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <circle cx="12" cy="12" r="2.4" fill="currentColor" />
          <circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.55" />
          <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.28" />
        </svg>
      </span>
      <span class="brand-name">Bhagya&nbsp;Sankar</span>
    </a>

    <nav class="links" [class.open]="isOpen()" aria-label="Primary">
      @for (link of links; track link.id) {
        <a
          [href]="'#' + link.id"
          [appScrollTo]="link.id"
          (click)="close()"
          [class.active]="activeId() === link.id"
        >{{ link.label }}</a>
      }
      <a href="#contact" appScrollTo="contact" class="cta btn btn-primary btn-sm" (click)="close()">Hire me</a>
    </nav>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="isOpen()"
      aria-controls="primary-nav"
      aria-label="Toggle navigation menu"
      (click)="toggle()"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
